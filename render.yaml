services:
  - type: web
    name: brucepanel
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYHERO_AUTH
        sync: false
      - key: PAYHERO_CHANNEL_ID
        sync: false
